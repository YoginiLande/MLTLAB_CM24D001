<!DOCTYPE html>
<html>
<head>

<title>Image Classification (CM24D001)</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f4f8;
text-align:center;
}

h1{
color:#1f3c88;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
width:380px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

img{
width:100%;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.preBtn{
background:#2ecc71;
}

.cusBtn{
background:#6c5ce7;
}

.result{
text-align:left;
margin-top:15px;
}

.bar{
height:8px;
background:#ddd;
border-radius:10px;
margin-bottom:10px;
}

.fill{
height:8px;
background:#2ecc71;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Image Classification </h1>

<div class="container">

<!-- PRETRAINED MODEL -->

<div class="card">

<h3>MobileNet (Pretrained)</h3>

<input type="file" id="upload1">

<img id="preview1">

<button class="preBtn" onclick="analyzePretrained()">Analyze Image</button>

<div id="pretrainedResults" class="result"></div>

</div>


<!-- CUSTOM MODEL -->

<div class="card">

<h3>Custom Vehicle Model</h3>

<input type="file" id="upload2">

<img id="preview2">

<button class="cusBtn" onclick="analyzeCustom()">Analyze Image</button>

<div id="customResults" class="result"></div>

</div>

</div>

<script>

let mobilenetModel;
let customModel;


// LOAD MODELS

async function loadModels(){

try{

mobilenetModel = await mobilenet.load();

const modelURL = "model/model.json";
const metadataURL = "model/metadata.json";

customModel = await tmImage.load(modelURL, metadataURL);

console.log("Models Loaded Successfully");

}catch(err){

console.error("Error loading models:",err);

}

}

loadModels();


// IMAGE PREVIEW

document.getElementById("upload1").onchange=function(e){

document.getElementById("preview1").src=
URL.createObjectURL(e.target.files[0]);

};

document.getElementById("upload2").onchange=function(e){

document.getElementById("preview2").src=
URL.createObjectURL(e.target.files[0]);

};


// PRETRAINED MODEL PREDICTION

async function analyzePretrained(){

if(!mobilenetModel){

alert("Pretrained model not loaded yet");
return;

}

const img=document.getElementById("preview1");

const predictions = await mobilenetModel.classify(img);

let html="";

predictions.slice(0,3).forEach(p=>{

let percent=(p.probability*100).toFixed(2);

html+=`
<p>${p.className} — ${percent}%</p>
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>
`;

});

document.getElementById("pretrainedResults").innerHTML=html;

}


// CUSTOM MODEL PREDICTION

async function analyzeCustom(){

if(!customModel){

alert("Custom model not loaded");
return;

}

const img=document.getElementById("preview2");

const predictions = await customModel.predict(img);

let html="";

predictions.forEach(p=>{

let percent=(p.probability*100).toFixed(2);

html+=`
<p>${p.className} — ${percent}%</p>
<div class="bar">
<div class="fill" style="width:${percent}%;background:#6c5ce7"></div>
</div>
`;

});

document.getElementById("customResults").innerHTML=html;

}

</script>

</body>
</html>
