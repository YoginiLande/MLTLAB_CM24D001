<!DOCTYPE html>
<html>
<head>
  <title>Pose Detection</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 { margin-top: 20px; }

    .container {
      position: relative;
      display: inline-block;
      margin-top: 20px;
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
      border-radius: 15px;
      overflow: hidden;
    }

    video, canvas {
      border-radius: 15px;
    }
  </style>
</head>

<body>

<h1>🧍 Pose Detection</h1>

<div class="container">
  <video id="video" width="640" height="480" autoplay></video>
  <canvas id="canvas" width="640" height="480"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  return new Promise(resolve => video.onloadedmetadata = resolve);
}

function drawKeypoints(kp){
  kp.forEach(p=>{
    if(p.score>0.5){
      ctx.beginPath();
      ctx.arc(p.position.x,p.position.y,5,0,2*Math.PI);
      ctx.fillStyle="cyan";
      ctx.fill();
    }
  });
}

function drawSkeleton(kp){
  const pairs = posenet.getAdjacentKeyPoints(kp,0.5);
  pairs.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo(a.position.x,a.position.y);
    ctx.lineTo(b.position.x,b.position.y);
    ctx.strokeStyle="lime";
    ctx.lineWidth=2;
    ctx.stroke();
  });
}

async function run(){
  const net = await posenet.load();
  await setupCamera();
  video.play();

  async function detect(){
    const pose = await net.estimateSinglePose(video,{flipHorizontal:true});

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    drawKeypoints(pose.keypoints);
    drawSkeleton(pose.keypoints);

    requestAnimationFrame(detect);
  }
  detect();
}

run();
</script>

</body>
</html>
