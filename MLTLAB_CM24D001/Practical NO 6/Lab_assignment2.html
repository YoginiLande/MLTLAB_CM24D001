<!DOCTYPE html>
<html>
<head>
  <title>Squat Counter</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

  <style>
    body {
      margin: 0;
      background: #0f2027;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 { margin-top: 20px; }

    .box {
      margin-top: 20px;
      position: relative;
      display: inline-block;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
    }

    .info {
      margin-top: 15px;
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>🏋️ Squat Counter</h1>

<div class="box">
  <video id="video" width="640" height="480" autoplay></video>
  <canvas id="canvas" width="640" height="480"></canvas>
</div>

<div class="info">
  Squats: <span id="count">0</span><br>
  Status: <span id="status">Waiting...</span>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let count = 0;
let stage = "up";

async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
  return new Promise(r=>video.onloadedmetadata=r);
}

function getAngle(A,B,C){
  const AB={x:A.x-B.x,y:A.y-B.y};
  const CB={x:C.x-B.x,y:C.y-B.y};
  const dot=AB.x*CB.x+AB.y*CB.y;
  const magAB=Math.sqrt(AB.x**2+AB.y**2);
  const magCB=Math.sqrt(CB.x**2+CB.y**2);
  return Math.acos(dot/(magAB*magCB))*180/Math.PI;
}

function detectSquat(kp){
  const hip=kp.find(p=>p.part==="leftHip");
  const knee=kp.find(p=>p.part==="leftKnee");
  const ankle=kp.find(p=>p.part==="leftAnkle");

  if(hip.score>0.5 && knee.score>0.5 && ankle.score>0.5){
    const angle=getAngle(hip.position,knee.position,ankle.position);

    if(angle<100){
      stage="down";
      document.getElementById("status").innerText="Down";
    }

    if(angle>160 && stage==="down"){
      stage="up";
      count++;
      document.getElementById("status").innerText="Up";
    }
  }

  document.getElementById("count").innerText=count;
}

async function run(){
  const net=await posenet.load();
  await setupCamera();
  video.play();

  async function detect(){
    const pose=await net.estimateSinglePose(video,{flipHorizontal:true});

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    detectSquat(pose.keypoints);

    requestAnimationFrame(detect);
  }
  detect();
}

run();
</script>

</body>
</html>
