<!DOCTYPE html>
<html>
<head>
  <title>Multi Pose Detection</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

  <style>
    body {
      margin: 0;
      background: #232526;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 { margin-top: 20px; }

    .container {
      margin-top: 20px;
      position: relative;
      display: inline-block;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<h1>👥 Multi Pose Detection</h1>

<div class="container">
  <video id="video" width="640" height="480" autoplay></video>
  <canvas id="canvas" width="640" height="480"></canvas>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

async function setupCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
  return new Promise(r=>video.onloadedmetadata=r);
}

function draw(kp){
  kp.forEach(p=>{
    if(p.score>0.5){
      ctx.beginPath();
      ctx.arc(p.position.x,p.position.y,4,0,2*Math.PI);
      ctx.fillStyle="yellow";
      ctx.fill();
    }
  });

  const pairs=posenet.getAdjacentKeyPoints(kp,0.5);
  pairs.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo(a.position.x,a.position.y);
    ctx.lineTo(b.position.x,b.position.y);
    ctx.strokeStyle="cyan";
    ctx.stroke();
  });
}

async function run(){
  const net=await posenet.load();
  await setupCamera();
  video.play();

  async function detect(){
    const poses=await net.estimateMultiplePoses(video,{maxDetections:5});

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    poses.forEach(p=>{
      draw(p.keypoints);
    });

    requestAnimationFrame(detect);
  }
  detect();
}

run();
</script>

</body>
</html>
