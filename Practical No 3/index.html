<!DOCTYPE html>
<html>
<head>
<title>Sentiment Analysis Yogini Lande (CM24D001)</title>

<style>

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
}

.container {
  background: #ffffff;
  padding: 40px;
  width: 420px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
  transition: 0.3s;
}

.container:hover {
  transform: translateY(-5px);
}

h2 {
  margin-bottom: 20px;
  color: #333;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 16px;
  transition: 0.3s;
}

input:focus {
  border-color: #667eea;
  box-shadow: 0 0 8px rgba(102,126,234,0.5);
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.result-box {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 18px;
  display: none;
}

.positive {
  background: #d4edda;
  color: #155724;
}

.negative {
  background: #f8d7da;
  color: #721c24;
}

.neutral {
  background: #fff3cd;
  color: #856404;
}

</style>

</head>

<body>

<div class="container">

<h2>✨ Sentiment Analysis</h2>

<input type="text" id="textInput" placeholder="Type your sentence...">

<br>

<button onclick="predictSentiment()">Analyze</button>

<div id="result" class="result-box"></div>

</div>

<script>

// Sentiment analysis function
function predictSentiment(){

let text = document.getElementById("textInput").value.toLowerCase()

if(text.trim() === ""){
  alert("Please enter a sentence!")
  return
}

// Word lists
let positive = ["love","amazing","happy","good","great","awesome","excellent","nice"]
let negative = ["hate","terrible","worst","bad","poor","awful","boring","sad"]

let score = 0

// Check positive words
positive.forEach(word=>{
  if(text.includes(word)) score++
})

// Check negative words
negative.forEach(word=>{
  if(text.includes(word)) score--
})

let resultBox = document.getElementById("result")
resultBox.style.display = "block"

// Result logic
if(score > 0){
  resultBox.className = "result-box positive"
  resultBox.innerHTML = `😊 Positive <br> Confidence: ${(score/positive.length).toFixed(2)}`
}
else if(score < 0){
  resultBox.className = "result-box negative"
  resultBox.innerHTML = `😞 Negative <br> Confidence: ${(Math.abs(score)/negative.length).toFixed(2)}`
}
else{
  resultBox.className = "result-box neutral"
  resultBox.innerHTML = `😐 Neutral`
}

}

</script>

</body>
</html>
